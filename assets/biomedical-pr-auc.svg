<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
<title id="title">Biomedical model PR-AUC comparison</title>
<desc id="desc">Horizontal bar chart comparing ensemble seed 42, ensemble five-seed mean, HistGBDT five-seed mean, and optimized QSVC.</desc>
<rect width="1100" height="500" fill="#f6f3ec"/>
<text x="54" y="52" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#171716">HYBRID QML–KG / TEST PR-AUC</text>
<text x="54" y="82" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#77736b">Public repository results · higher is better</text>
<g font-family="Arial, Helvetica, sans-serif">
  <line x1="300" y1="112" x2="300" y2="420" stroke="#aaa59b"/>
  <line x1="450" y1="112" x2="450" y2="420" stroke="#ddd7cc"/>
  <line x1="600" y1="112" x2="600" y2="420" stroke="#ddd7cc"/>
  <line x1="750" y1="112" x2="750" y2="420" stroke="#ddd7cc"/>
  <line x1="900" y1="112" x2="900" y2="420" stroke="#ddd7cc"/>
  <text x="300" y="444" text-anchor="middle" font-size="10" fill="#77736b">0.0</text>
  <text x="450" y="444" text-anchor="middle" font-size="10" fill="#77736b">0.2</text>
  <text x="600" y="444" text-anchor="middle" font-size="10" fill="#77736b">0.4</text>
  <text x="750" y="444" text-anchor="middle" font-size="10" fill="#77736b">0.6</text>
  <text x="900" y="444" text-anchor="middle" font-size="10" fill="#77736b">0.8</text>

  <text x="54" y="157" font-size="13" fill="#171716" font-weight="700">Ensemble · seed 42</text>
  <rect x="300" y="132" width="585.4" height="38" fill="#235f99"/>
  <text x="901" y="157" font-size="13" fill="#235f99" font-weight="700">0.7805</text>

  <text x="54" y="237" font-size="13" fill="#171716" font-weight="700">Ensemble · 5-seed mean</text>
  <rect x="300" y="212" width="554.9" height="38" fill="#5b8bb7"/>
  <text x="871" y="237" font-size="13" fill="#235f99" font-weight="700">0.7398 ± 0.038</text>

  <text x="54" y="317" font-size="13" fill="#171716" font-weight="700">HistGBDT · 5-seed mean</text>
  <rect x="300" y="292" width="554.5" height="38" fill="#77736b"/>
  <text x="871" y="317" font-size="13" fill="#55514b" font-weight="700">0.7393 ± 0.037</text>

  <text x="54" y="397" font-size="13" fill="#171716" font-weight="700">Optimized QSVC</text>
  <rect x="300" y="372" width="375" height="38" fill="#bd765f"/>
  <text x="692" y="397" font-size="13" fill="#9b533d" font-weight="700">≈ 0.50</text>

  <rect x="54" y="462" width="992" height="1" fill="#171716"/>
  <text x="54" y="486" font-size="11" fill="#55514b">VERDICT: the ensemble clears the project threshold; the quantum classifier does not establish advantage.</text>
</g>
</svg>