<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
<title id="title">Public systems evidence map</title>
<desc id="desc">Four public projects across biomedical AI, warehouse simulation, agent governance, and quantum sensing.</desc>
<rect width="1200" height="560" fill="#f6f3ec"/>
